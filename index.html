<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RePack mPOS Scanner Pro v2</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <style>
        /* --- Gaya UI Modern (mPOS Aesthetic) --- */
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #1c1c1e;
            --ios-subtext: #8e8e93;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --scanner-guide: rgba(255, 255, 255, 0.9);
            --scanner-dim: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg); color: var(--ios-text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            background: var(--ios-card); border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            width: 100%; max-width: 420px; box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 700; font-size: 24px;}
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; color: var(--ios-subtext); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="text"] {
            width: 100%; padding: 16px; border: 1.5px solid #d1d1d6;
            border-radius: 14px; font-size: 17px; box-sizing: border-box; background-color: #fafafa;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--ios-blue); background-color: #ffffff; }
        .input-group { display: flex; gap: 12px; }

        .btn {
            border: none; border-radius: 14px; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: transform 0.1s ease, opacity 0.2s ease;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-scan { background-color: var(--ios-green); color: white; padding: 0 24px; white-space: nowrap; }
        .btn-submit { background-color: var(--ios-blue); color: white; padding: 18px; width: 100%; margin-top: 15px; }

        /* --- Scanner Full Screen --- */
        #scannerBox {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background-color: #000;
            z-index: 9999; flex-direction: column;
            overflow: hidden;
        }

        #interactive.viewport { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* --- KUNCI ANTI-ZOOM --- */
        /* object-fit: contain memastikan video tampil utuh 100% tanpa dipotong */
        #interactive.viewport video { 
            width: 100%; height: 100%; 
            object-fit: contain !important; 
        }
        #interactive.viewport canvas.drawingBuffer { display: none; }

        /* Top Bar */
        .top-bar {
            position: absolute; top: 20px; left: 0;
            width: 100%; display: flex; justify-content: space-between;
            padding: 10px 20px; box-sizing: border-box; 
            z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .btn-icon {
            background-color: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px;
            padding: 10px 20px; font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .btn-icon#flashBtn.on { background-color: #ffd60a; color: black; border-color: #ffd60a;}

        /* Scanner Overlay */
        .scanner-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 5;
            pointer-events: none; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .guide-box {
            width: 85%; height: 150px; max-width: 380px;
            border: 3px solid var(--scanner-guide); border-radius: 16px; position: relative;
            box-shadow: 0 0 0 9999px var(--scanner-dim);
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        .guide-box.success {
            border-color: var(--ios-green); background-color: rgba(52, 199, 89, 0.3);
            box-shadow: 0 0 0 9999px var(--scanner-dim), 0 0 25px var(--ios-green);
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 6px; height: 6px; background-color: #ff3b30;
            border-radius: 50%; box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.9);
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background-color: var(--ios-green); box-shadow: 0 0 10px var(--ios-green);
            animation: scan 2.2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; } 15% { opacity: 1; }
            85% { opacity: 1; } 100% { top: 100%; opacity: 0; }
        }

        .help-text {
            color: white; font-size: 14px; font-weight: 600;
            margin-top: 30px; text-shadow: 0 2px 6px rgba(0,0,0,0.9);
            z-index: 6; text-align: center; line-height: 1.6; padding: 0 30px;
        }

        /* Bottom Bar (Tombol Kamera) */
        .bottom-bar {
            position: absolute; 
            bottom: 60px;
            left: 0; width: 100%; display: flex; justify-content: center; z-index: 20;
        }
        .btn-shutter {
            background-color: white; border: 6px solid rgba(0,0,0,0.3);
            width: 75px; height: 75px; border-radius: 50%;
            cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }
        .btn-shutter:active { transform: scale(0.92); }

        /* --- OCR Workflow UI --- */
        #ocrWorkflow {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 30;
            flex-direction: column;
        }
        
        .cropper-container-wrapper {
            width: 100%; height: 75%;
            background-color: black;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #ocrImageFrame { max-width: 100%; max-height: 100%; }

        /* Panel Bawah OCR */
        .ocr-bottom-bar {
            height: 25%; min-height: 170px; width: 100%; background: var(--ios-card);
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 25px 20px; box-sizing: border-box; box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
        }
        .ocr-instruction {
            font-size: 15px; color: var(--ios-subtext); font-weight: 600; text-align: center; margin-bottom: 20px;
        }
        .ocr-btn-group { display: flex; gap: 15px; width: 100%; max-width: 350px;}
        .ocr-btn {
            flex: 1; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700;
            border: none; cursor: pointer; text-align: center; transition: opacity 0.2s;
        }
        .ocr-btn:active { opacity: 0.8; }
        .btn-ocr-process { background-color: var(--ios-blue); color: white; }
        .btn-ocr-retry { background-color: #e5e5ea; color: var(--ios-text); }

        /* Titik Tarik Cropper */
        .cropper-point {
            width: 36px !important; height: 36px !important;
            background-color: var(--ios-blue) !important; border-radius: 50% !important; opacity: 1 !important;
        }
        .cropper-point.point-se { right: -18px !important; bottom: -18px !important; }
        .cropper-point.point-sw { left: -18px !important; bottom: -18px !important; }
        .cropper-point.point-ne { right: -18px !important; top: -18px !important; }
        .cropper-point.point-nw { left: -18px !important; top: -18px !important; }
        .cropper-point.point-e, .cropper-point.point-w, .cropper-point.point-n, .cropper-point.point-s { display: none !important; }
        .cropper-view-box { outline: 3px solid var(--ios-blue) !important; }
        .cropper-line { background-color: transparent !important; }

        /* Loading Spinner */
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 17px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3); border-top: 4px solid var(--ios-blue);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>RePack mPOS</h2>
    
    <form id="itemForm">
        <div class="form-group">
            <label for="barcodeInput">Kode Barcode / SKU</label>
            <div class="input-group">
                <input type="text" id="barcodeInput" placeholder="Scan barcode..." required>
                <button type="button" id="startScanBtn" class="btn btn-scan">📷 SCAN</button>
            </div>
        </div>

        <div class="form-group">
            <label for="itemName">Nama Barang</label>
            <input type="text" id="itemName" placeholder="Masukkan nama barang" required>
        </div>

        <button type="submit" class="btn btn-submit">SIMPAN DATA</button>
    </form>
</div>

<div id="scannerBox">
    <div class="scanner-window">
        <div id="interactive" class="viewport"></div>
        
        <div class="top-bar">
            <button type="button" id="stopScanBtn" class="btn-icon">✖ TUTUP</button>
            <button type="button" id="flashBtn" class="btn-icon">🔦 SENTER OFF</button>
        </div>
        
        <div class="scanner-overlay" id="scannerOverlayAuto">
            <div class="guide-box" id="guideBox">
                <div class="scan-line" id="scanLine"></div>
                <div class="center-dot"></div> 
            </div>
            <div class="help-text">
                Posisikan garis di barcode. Lensa akan fokus otomatis.<br>
                Jika barcode rusak, <b>tekan tombol bulat</b> di bawah untuk jepret.
            </div>
        </div>
        
        <div class="bottom-bar" id="bottomBarAuto">
            <button type="button" id="btnCapture" class="btn-shutter"></button>
        </div>

        <div id="ocrWorkflow">
            <div class="cropper-container-wrapper">
                <img id="ocrImageFrame" src="" alt="Jepretan untuk OCR">
            </div>
            <div class="ocr-bottom-bar">
                <div class="ocr-instruction">Sesuaikan kotak ini tepat di atas ANGKA barcode</div>
                <div class="ocr-btn-group">
                    <button type="button" id="btnOcrRetry" class="ocr-btn btn-ocr-retry">Ulang Foto</button>
                    <button type="button" id="btnOcrProcess" class="ocr-btn btn-ocr-process">Baca Bagian Ini</button>
                </div>
            </div>
        </div>

        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div id="loadingText">Menganalisis...</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const btnCapture = document.getElementById('btnCapture');
    const flashBtn = document.getElementById('flashBtn');
    const scannerBox = document.getElementById('scannerBox');
    const barcodeInput = document.getElementById('barcodeInput');
    const itemForm = document.getElementById('itemForm');
    
    const guideBox = document.getElementById('guideBox');
    const scannerOverlayAuto = document.getElementById('scannerOverlayAuto');
    const bottomBarAuto = document.getElementById('bottomBarAuto');
    const ocrWorkflow = document.getElementById('ocrWorkflow');
    const ocrImageFrame = document.getElementById('ocrImageFrame');
    const btnOcrRetry = document.getElementById('btnOcrRetry');
    const btnOcrProcess = document.getElementById('btnOcrProcess');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');

    let scanCount = 0;
    let lastScannedCode = "";
    let isTorchOn = false;
    let cropper = null; 

    // --- NYALAKAN KAMERA (TIDAK ZOOM) ---
    function nyalakanKamera() {
        Quagga.init({
            inputStream : {
                name : "Live", type : "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    facingMode: "environment",
                    width: { ideal: 1280 }, height: { ideal: 720 },
                    advanced: [{ focusMode: "continuous" }] 
                },
                // Area baca sedikit lebih luas karena gambar tidak lagi nge-zoom
                area: { top: "20%", right: "5%", left: "5%", bottom: "20%" } 
            },
            locator: { patchSize: "small", halfSample: false }, 
            numOfWorkers: navigator.hardwareConcurrency ? Math.min(navigator.hardwareConcurrency, 4) : 2,
            decoder : { 
                readers : [
                    "code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", 
                    "code_39_vin_reader", "codabar_reader", "upc_reader", "upc_e_reader", 
                    "i2of5_reader", "2of5_reader", "code_93_reader"
                ] 
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Kamera tidak dapat diakses.");
                scannerBox.style.display = 'none';
                return;
            }
            Quagga.start();
        });
    }

    startScanBtn.addEventListener('click', function() {
        scannerBox.style.display = 'flex';
        guideBox.classList.remove('success'); 
        ocrWorkflow.style.display = 'none'; 
        scannerOverlayAuto.style.display = 'flex';
        bottomBarAuto.style.display = 'flex';
        scanCount = 0;
        lastScannedCode = "";
        
        isTorchOn = false;
        flashBtn.innerText = "🔦 SENTER OFF";
        flashBtn.classList.remove('on');

        nyalakanKamera();
    });

    stopScanBtn.addEventListener('click', function() {
        Quagga.stop();
        if (cropper) cropper.destroy(); 
        scannerBox.style.display = 'none';
    });

    flashBtn.addEventListener('click', async function() {
        const track = Quagga.CameraAccess.getActiveTrack();
        if (track && typeof track.getCapabilities === 'function') {
            const capabilities = track.getCapabilities();
            if (capabilities.torch) {
                isTorchOn = !isTorchOn; 
                try {
                    await track.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                    flashBtn.innerText = isTorchOn ? "💡 SENTER ON" : "🔦 SENTER OFF";
                    flashBtn.classList.toggle('on', isTorchOn);
                } catch (err) {}
            }
        }
    });

    // --- DETEKSI BARCODE GARIS ---
    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;
        const format = result.codeResult.format;

        let isValid = true;
        if (format === "ean_13" && code.length !== 13) isValid = false;
        if (format === "upc_a" && code.length !== 12) isValid = false;
        if (format === "ean_8" && code.length !== 8) isValid = false;
        if (code.length < 4) isValid = false;

        if (!isValid) return;

        if (code === lastScannedCode) {
            scanCount++;
        } else {
            scanCount = 1;
            lastScannedCode = code;
        }

        if (scanCount >= 6) { 
            guideBox.classList.add('success');
            if ("vibrate" in navigator) navigator.vibrate(150); 
            
            setTimeout(() => {
                barcodeInput.value = code;
                Quagga.stop();
                scannerBox.style.display = 'none';
            }, 300);
        }
    });

    // --- JEPRET (MASUK MODE OCR) ---
    btnCapture.addEventListener('click', function() {
        const video = document.querySelector('#interactive video');
        if (!video) return;

        Quagga.stop();
        if ("vibrate" in navigator) navigator.vibrate(50);

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageDataUrl = canvas.toDataURL('image/jpeg');

        scannerOverlayAuto.style.display = 'none'; 
        bottomBarAuto.style.display = 'none'; 
        ocrWorkflow.style.display = 'flex'; 
        ocrImageFrame.src = imageDataUrl; 

        if (cropper) cropper.destroy(); 
        cropper = new Cropper(ocrImageFrame, {
            viewMode: 1, 
            dragMode: 'move', 
            autoCropArea: 0.3, 
            aspectRatio: NaN, 
            restore: false, guides: true, center: true, highlight: true,
            cropBoxMovable: true, cropBoxResizable: true, toggleDragModeOnDblclick: false,
            ready: function () {
                const containerData = cropper.getContainerData();
                const boxWidth = containerData.width * 0.85; 
                const boxHeight = 150; 
                
                cropper.setCropBoxData({
                    width: boxWidth,
                    height: boxHeight,
                    left: (containerData.width - boxWidth) / 2,
                    top: (containerData.height - boxHeight) / 2
                });
            }
        });
    });

    // --- OCR: COBA LAGI ---
    btnOcrRetry.addEventListener('click', function() {
        if (cropper) cropper.destroy();
        ocrWorkflow.style.display = 'none';
        
        scannerOverlayAuto.style.display = 'flex';
        bottomBarAuto.style.display = 'flex';
        guideBox.classList.remove('success');
        scanCount = 0;
        
        nyalakanKamera(); 
    });

    // --- OCR: PROSES BACA ANGKA ---
    btnOcrProcess.addEventListener('click', function() {
        if (!cropper) return;

        const croppedCanvas = cropper.getCroppedCanvas({
            imageSmoothingQuality: 'high'
        });
        if (!croppedCanvas) return;

        loadingText.innerText = "Membaca Bagian Terpilih... ⏳";
        loadingOverlay.style.display = 'flex';

        Tesseract.recognize(
            croppedCanvas, 
            'eng', 
            { 
                logger: m => console.log(m),
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' 
            }
        ).then(({ data: { text } }) => {
            const cleanText = text.replace(/[^a-zA-Z0-9-]/g, '');
            loadingOverlay.style.display = 'none';

            if (cleanText.length >= 4) { 
                loadingText.innerText = "Sukses! ✔️";
                setTimeout(() => {
                    barcodeInput.value = cleanText;
                    if (cropper) cropper.destroy();
                    scannerBox.style.display = 'none';
                }, 500);
            } else {
                alert("Angka tidak terbaca jelas. Posisikan kotak lebih rapat ke angka atau ketik manual.");
            }
        }).catch(err => {
            console.error(err);
            loadingOverlay.style.display = 'none';
            alert("Gagal memproses gambar. Pastikan internet stabil.");
        });
    });

    // --- SUBMIT FORM DATA ---
    itemForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const code = barcodeInput.value;
        const name = document.getElementById('itemName').value;
        alert(`Data Tersimpan!\n\nBarcode: ${code}\nNama: ${name}`);
        itemForm.reset();
    });
</script>

</body>
</html>
