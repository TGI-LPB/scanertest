<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePack mPOS Scanner Pro</title>
    <style>
        /* Gaya UI Modern ala iOS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7; color: #1c1c1e;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: #ffffff; border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 600; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; color: #8e8e93; margin-bottom: 8px; font-weight: 500; }
        input[type="text"] {
            width: 100%; padding: 14px; border: 1px solid #d1d1d6;
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background-color: #fafafa;
        }
        input:focus { outline: none; border-color: #007aff; background-color: #ffffff; }
        .input-group { display: flex; gap: 10px; }

        .btn {
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: transform 0.1s ease, opacity 0.2s ease;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-scan { background-color: #34c759; color: white; padding: 0 20px; white-space: nowrap; }
        .btn-submit { background-color: #007aff; color: white; padding: 16px; width: 100%; margin-top: 10px; }

        /* --- Scanner Full Screen --- */
        #scannerBox {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background-color: #000;
            z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .scanner-window {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        #interactive.viewport { width: 100%; height: 100%; position: relative; }
        
        #interactive.viewport canvas.drawingBuffer,
        #interactive.viewport video {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover !important; 
            z-index: 1;
        }
        #interactive.viewport canvas.drawingBuffer { z-index: 2; pointer-events: none; }

        .scanner-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 5;
            pointer-events: auto; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; touch-action: none;
        }

        .guide-box {
            width: 85%; height: 140px; max-width: 360px;
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 12px; position: relative;
            background-color: rgba(0, 0, 0, 0.1); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .guide-box.success {
            border-color: #34c759; background-color: rgba(52, 199, 89, 0.2);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 20px #34c759;
        }
        
        .guide-box.ocr-mode { border-color: #007aff; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7); }

        .center-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: #ff3b30;
            border-radius: 50%; box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background-color: #34c759; box-shadow: 0 0 8px #34c759;
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; } 10% { opacity: 1; }
            90% { opacity: 1; } 100% { top: 100%; opacity: 0; }
        }

        #flash-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; z-index: 10;
            pointer-events: none; transition: opacity 0.1s ease-out;
        }
        .flash-active { opacity: 0.8 !important; transition: none !important; }

        .help-text {
            color: white; font-size: 14px; font-weight: 500;
            margin-top: 25px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 6; pointer-events: none; text-align: center; line-height: 1.5;
        }

        .controls-bottom {
            position: absolute; bottom: calc(40px + env(safe-area-inset-bottom, 0px)); 
            left: 0; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20;
        }

        .btn-scanner {
            background-color: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: white; padding: 12px 24px; border-radius: 30px;
            font-size: 14px; font-weight: 600; border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
        }
        .btn-ocr { background-color: rgba(0, 122, 255, 0.8); border-color: #007aff; }

        #ocrLoading {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-weight: bold; font-size: 18px;
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; z-index: 30;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Data Item</h2>
    
    <form id="itemForm">
        <div class="form-group">
            <label for="barcodeInput">Kode Barcode / SKU</label>
            <div class="input-group">
                <input type="text" id="barcodeInput" placeholder="Scan barcode..." required>
                <button type="button" id="startScanBtn" class="btn btn-scan">📷 Scan</button>
            </div>
        </div>

        <div class="form-group">
            <label for="itemName">Nama Barang</label>
            <input type="text" id="itemName" placeholder="Masukkan nama barang" required>
        </div>

        <button type="submit" class="btn btn-submit">Simpan Data</button>
    </form>
</div>

<div id="scannerBox">
    <div class="scanner-window">
        <div id="interactive" class="viewport"></div>
        <div id="flash-effect"></div>
        
        <div class="scanner-overlay" id="tapArea">
            <div class="guide-box" id="guideBox">
                <div class="scan-line" id="scanLine"></div>
                <div class="center-dot" id="centerDot"></div> 
            </div>
            
            <div class="help-text" id="helpText">Ketuk 2x cepat untuk lampu senter</div>
        </div>
        
        <div id="ocrLoading">Membaca Teks... ⏳</div>
    </div>
    
    <div class="controls-bottom">
        <button type="button" id="btnOcr" class="btn-scanner btn-ocr">Jepret Teks</button>
        <button type="button" id="stopScanBtn" class="btn-scanner">Batal</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const btnOcr = document.getElementById('btnOcr');
    const scannerBox = document.getElementById('scannerBox');
    const barcodeInput = document.getElementById('barcodeInput');
    const itemForm = document.getElementById('itemForm');
    
    const tapArea = document.getElementById('tapArea');
    const flashEffect = document.getElementById('flash-effect');
    const guideBox = document.getElementById('guideBox');
    const ocrLoading = document.getElementById('ocrLoading');
    const scanLine = document.getElementById('scanLine');
    const helpText = document.getElementById('helpText');

    let scanCount = 0;
    let lastScannedCode = "";
    let isTorchOn = false;
    let lastClickTime = 0;

    startScanBtn.addEventListener('click', function() {
        scannerBox.style.display = 'flex';
        guideBox.className = 'guide-box'; 
        scanLine.style.display = 'block';
        helpText.innerHTML = "Posisikan barcode di garis hijau<br>Ketuk 2x cepat untuk senter";
        scanCount = 0;
        lastScannedCode = "";
        isTorchOn = false;

        Quagga.init({
            inputStream : {
                name : "Live",
                type : "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    advanced: [{ focusMode: "continuous" }]
                },
                // PERBAIKAN: Area diperlebar secara horizontal agar ujung barcode tidak terpotong
                area: { top: "35%", right: "5%", left: "5%", bottom: "35%" }
            },
            locator: { 
                patchSize: "small", // Diubah ke small agar pandangan lebih seimbang
                halfSample: false 
            },
            numOfWorkers: navigator.hardwareConcurrency ? Math.min(navigator.hardwareConcurrency, 4) : 2,
            decoder : { 
                readers : [
                    "ean_reader", "upc_reader", "code_128_reader", 
                    "ean_8_reader", "code_39_reader", "i2of5_reader"
                ] 
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Kamera tidak dapat diakses.");
                scannerBox.style.display = 'none';
                return;
            }
            Quagga.start();
        });
    });

    stopScanBtn.addEventListener('click', function() {
        Quagga.stop();
        scannerBox.style.display = 'none';
    });

    tapArea.addEventListener('click', async function(e) {
        const currentTime = new Date().getTime();
        const timeDiff = currentTime - lastClickTime;

        if (timeDiff < 400 && timeDiff > 0) {
            flashEffect.classList.add('flash-active');
            setTimeout(() => flashEffect.classList.remove('flash-active'), 100);

            const track = Quagga.CameraAccess.getActiveTrack();
            if (track && typeof track.getCapabilities === 'function') {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    isTorchOn = !isTorchOn; 
                    try {
                        await track.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                    } catch (err) {}
                }
            }
            lastClickTime = 0; 
        } else {
            lastClickTime = currentTime;
        }
    });

    // --- PERBAIKAN: Smart Validator & Anti Mental ---
    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;
        const format = result.codeResult.format;

        // 1. FILTER PINTAR: Tolak jika panjang barcode tidak masuk akal dengan formatnya
        let isValid = true;
        if (format === "ean_13" && code.length !== 13) isValid = false;
        if (format === "upc_a" && code.length !== 12) isValid = false;
        if (format === "ean_8" && code.length !== 8) isValid = false;
        // Code 128 dan Code 39 panjangnya bervariasi, tapi minimal biasanya 4 karakter
        if ((format === "code_128" || format === "code_39") && code.length < 4) isValid = false;

        // Jika terpotong / tidak valid, abaikan dan biarkan Quagga terus mencari
        if (!isValid) {
            console.log("Barcode terpotong/tidak valid ditolak:", code, "Format:", format);
            return; 
        }

        // 2. VERIFIKASI KONSISTENSI (Syarat harus terbaca sama 3x berturut-turut)
        if (code === lastScannedCode) {
            scanCount++;
        } else {
            scanCount = 1;
            lastScannedCode = code;
        }

        if (scanCount >= 3) {
            guideBox.classList.add('success');
            if ("vibrate" in navigator) navigator.vibrate(150); 
            
            setTimeout(() => {
                barcodeInput.value = code;
                Quagga.stop();
                scannerBox.style.display = 'none';
            }, 250);
        }
    });

    // --- Mode OCR (Membaca Teks) ---
    btnOcr.addEventListener('click', function() {
        Quagga.stop();
        
        guideBox.className = 'guide-box ocr-mode';
        scanLine.style.display = 'none';
        helpText.innerHTML = "Posisikan ANGKA barcode di dalam kotak biru,<br>lalu tunggu sebentar...";
        ocrLoading.style.display = 'block';

        flashEffect.classList.add('flash-active');
        setTimeout(() => flashEffect.classList.remove('flash-active'), 100);
        if ("vibrate" in navigator) navigator.vibrate(50);

        const video = document.querySelector('#interactive video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        Tesseract.recognize(
            canvas,
            'eng',
            { 
                logger: m => console.log(m),
                tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-' 
            }
        ).then(({ data: { text } }) => {
            const cleanText = text.replace(/\s+/g, '');
            ocrLoading.style.display = 'none';

            if (cleanText.length >= 4) { 
                barcodeInput.value = cleanText;
                alert("Sukses Membaca Teks: " + cleanText);
                scannerBox.style.display = 'none';
            } else {
                alert("Gagal membaca teks dengan jelas. Coba jepret ulang atau ketik manual.");
                scannerBox.style.display = 'none';
            }
        }).catch(err => {
            console.error(err);
            ocrLoading.style.display = 'none';
            alert("Terjadi kesalahan pada mesin pembaca teks.");
            scannerBox.style.display = 'none';
        });
    });

    itemForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const code = barcodeInput.value;
        const name = document.getElementById('itemName').value;
        alert(`Data Tersimpan!\n\nBarcode: ${code}\nNama: ${name}`);
        itemForm.reset();
    });
</script>

</body>
</html>
