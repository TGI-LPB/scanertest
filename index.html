<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RePack mPOS Scanner Pro</title>
    <style>
        /* Gaya UI Modern */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7; color: #1c1c1e;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            background: #ffffff; border-radius: 20px; padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; box-sizing: border-box;
        }
        h2 { margin-top: 0; text-align: center; font-weight: 600; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 14px; color: #8e8e93; margin-bottom: 8px; font-weight: 500; }
        input[type="text"] {
            width: 100%; padding: 14px; border: 1px solid #d1d1d6;
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background-color: #fafafa;
        }
        input:focus { outline: none; border-color: #007aff; background-color: #ffffff; }
        .input-group { display: flex; gap: 10px; }

        .btn {
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: transform 0.1s ease, opacity 0.2s ease;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-scan { background-color: #34c759; color: white; padding: 0 20px; white-space: nowrap; }
        .btn-submit { background-color: #007aff; color: white; padding: 16px; width: 100%; margin-top: 10px; }

        /* --- Scanner Full Screen --- */
        #scannerBox {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background-color: #000;
            z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .scanner-window {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        #interactive.viewport { width: 100%; height: 100%; position: relative; }
        
        #interactive.viewport canvas.drawingBuffer,
        #interactive.viewport video {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover !important; 
            z-index: 1;
        }
        #interactive.viewport canvas.drawingBuffer { z-index: 2; pointer-events: none; }

        /* Top Bar (Tutup & Flash) */
        .top-bar {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 0;
            width: 100%; display: flex; justify-content: space-between;
            padding: 15px 20px; box-sizing: border-box; z-index: 20;
        }
        .btn-icon {
            background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px;
            padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
        }

        /* Overlay Area Tengah */
        .scanner-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 5;
            pointer-events: none; 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .guide-box {
            width: 85%; height: 140px; max-width: 360px;
            border: 2px solid rgba(255, 255, 255, 0.6); border-radius: 12px; position: relative;
            background-color: rgba(0, 0, 0, 0.1); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .guide-box.success {
            border-color: #34c759; background-color: rgba(52, 199, 89, 0.2);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5), 0 0 20px #34c759;
        }

        .center-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: #ff3b30;
            border-radius: 50%; box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background-color: #34c759; box-shadow: 0 0 8px #34c759;
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; } 10% { opacity: 1; }
            90% { opacity: 1; } 100% { top: 100%; opacity: 0; }
        }

        .help-text {
            color: white; font-size: 13px; font-weight: 500;
            margin-top: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 6; text-align: center; line-height: 1.5;
        }

        /* Bottom Bar (Tombol OCR) */
        .bottom-bar {
            position: absolute; bottom: calc(30px + env(safe-area-inset-bottom, 0px)); 
            left: 0; width: 100%; display: flex; justify-content: center; z-index: 20;
        }
        .btn-shutter {
            background-color: #007aff; border: 3px solid rgba(255,255,255,0.5);
            color: white; padding: 15px 30px; border-radius: 30px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-shutter:active { transform: scale(0.95); background-color: #005bb5; }

        /* Loading & Preview OCR */
        #ocrOverlay {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 30;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #ocrPreview {
            width: 100%; max-height: 70%; object-fit: contain; margin-bottom: 20px;
        }
        .ocr-status {
            color: white; font-weight: bold; font-size: 16px;
            background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kasir RePack POS</h2>
    
    <form id="itemForm">
        <div class="form-group">
            <label for="barcodeInput">Kode Barcode / SKU</label>
            <div class="input-group">
                <input type="text" id="barcodeInput" placeholder="Scan barcode..." required>
                <button type="button" id="startScanBtn" class="btn btn-scan">📷 Scan</button>
            </div>
        </div>

        <div class="form-group">
            <label for="itemName">Nama Barang</label>
            <input type="text" id="itemName" placeholder="Masukkan nama barang" required>
        </div>

        <button type="submit" class="btn btn-submit">Simpan Data</button>
    </form>
</div>

<div id="scannerBox">
    <div class="scanner-window">
        <div id="interactive" class="viewport"></div>
        
        <div class="top-bar">
            <button type="button" id="stopScanBtn" class="btn-icon">✖ Batal</button>
            <button type="button" id="flashBtn" class="btn-icon">🔦 Senter</button>
        </div>
        
        <div class="scanner-overlay">
            <div class="guide-box" id="guideBox">
                <div class="scan-line" id="scanLine"></div>
                <div class="center-dot"></div> 
            </div>
            <div class="help-text">
                Posisikan garis di barcode.<br>
                Jika gagal, arahkan ke <b>angka</b> dan tekan tombol bawah.
            </div>
        </div>
        
        <div class="bottom-bar">
            <button type="button" id="btnOcr" class="btn-shutter">📸 Jepret Angka</button>
        </div>

        <div id="ocrOverlay">
            <img id="ocrPreview" src="" alt="Hasil Jepretan">
            <div class="ocr-status" id="ocrStatusText">Menganalisis Angka... ⏳</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const btnOcr = document.getElementById('btnOcr');
    const flashBtn = document.getElementById('flashBtn');
    const scannerBox = document.getElementById('scannerBox');
    const barcodeInput = document.getElementById('barcodeInput');
    const itemForm = document.getElementById('itemForm');
    
    const guideBox = document.getElementById('guideBox');
    const ocrOverlay = document.getElementById('ocrOverlay');
    const ocrPreview = document.getElementById('ocrPreview');
    const ocrStatusText = document.getElementById('ocrStatusText');

    let scanCount = 0;
    let lastScannedCode = "";
    let isTorchOn = false;

    // --- MULAI SCANNER ---
    startScanBtn.addEventListener('click', function() {
        scannerBox.style.display = 'flex';
        guideBox.classList.remove('success'); 
        ocrOverlay.style.display = 'none';
        scanCount = 0;
        lastScannedCode = "";
        isTorchOn = false;

        Quagga.init({
            inputStream : {
                name : "Live",
                type : "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    advanced: [{ focusMode: "continuous" }]
                },
                area: { top: "35%", right: "5%", left: "5%", bottom: "35%" }
            },
            locator: { patchSize: "small", halfSample: false },
            numOfWorkers: navigator.hardwareConcurrency ? Math.min(navigator.hardwareConcurrency, 4) : 2,
            decoder : { 
                readers : ["code_128_reader", "ean_reader", "ean_8_reader", "upc_reader", "upc_e_reader"] 
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Kamera tidak dapat diakses.");
                scannerBox.style.display = 'none';
                return;
            }
            Quagga.start();
        });
    });

    // --- TUTUP SCANNER ---
    stopScanBtn.addEventListener('click', function() {
        Quagga.stop();
        scannerBox.style.display = 'none';
    });

    // --- TOMBOL SENTER MANUAL ---
    flashBtn.addEventListener('click', async function() {
        const track = Quagga.CameraAccess.getActiveTrack();
        if (track && typeof track.getCapabilities === 'function') {
            const capabilities = track.getCapabilities();
            if (capabilities.torch) {
                isTorchOn = !isTorchOn; 
                try {
                    await track.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                    flashBtn.style.backgroundColor = isTorchOn ? "rgba(255, 255, 255, 0.8)" : "rgba(0, 0, 0, 0.5)";
                    flashBtn.style.color = isTorchOn ? "black" : "white";
                } catch (err) {}
            } else {
                alert("Perangkat tidak mendukung senter via web.");
            }
        }
    });

    // --- DETEKSI BARCODE GARIS (AUTO) ---
    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;

        if (code.length < 5) return; // Filter sampah

        if (code === lastScannedCode) {
            scanCount++;
        } else {
            scanCount = 1;
            lastScannedCode = code;
        }

        if (scanCount >= 4) {
            guideBox.classList.add('success');
            if ("vibrate" in navigator) navigator.vibrate(150); 
            
            setTimeout(() => {
                barcodeInput.value = code;
                Quagga.stop();
                scannerBox.style.display = 'none';
            }, 300);
        }
    });

    // --- MODE OCR (JEPRET ANGKA) ---
    btnOcr.addEventListener('click', function() {
        // Ambil elemen video yang sedang memutar kamera
        const video = document.querySelector('#interactive video');
        if (!video) return;

        // Buat kanvas untuk menangkap *screenshot*
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Ubah jadi file gambar (Base64)
        const imageDataUrl = canvas.toDataURL('image/jpeg');

        // Hentikan Quagga dan tampilkan layar Loading + Preview Gambar
        Quagga.stop();
        ocrPreview.src = imageDataUrl;
        ocrOverlay.style.display = 'flex';
        ocrStatusText.innerText = "Menganalisis Angka... ⏳";
        if ("vibrate" in navigator) navigator.vibrate(50);

        // Lempar gambar ke Tesseract.js (AI)
        Tesseract.recognize(
            imageDataUrl,
            'eng',
            { logger: m => console.log(m) }
        ).then(({ data: { text } }) => {
            // Bersihkan teks: Hanya ambil angka dan huruf besar
            const cleanText = text.replace(/[^a-zA-Z0-9]/g, '');

            if (cleanText.length >= 4) { 
                ocrStatusText.innerText = "Sukses! ✔️";
                setTimeout(() => {
                    barcodeInput.value = cleanText;
                    scannerBox.style.display = 'none';
                }, 800);
            } else {
                alert("Teks tidak terbaca jelas. Silakan ketik manual atau coba jepret lagi.");
                scannerBox.style.display = 'none';
            }
        }).catch(err => {
            console.error(err);
            alert("Sistem OCR sedang sibuk. Coba beberapa saat lagi.");
            scannerBox.style.display = 'none';
        });
    });

    // --- SUBMIT FORM ---
    itemForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const code = barcodeInput.value;
        const name = document.getElementById('itemName').value;
        alert(`Data Tersimpan!\n\nBarcode: ${code}\nNama: ${name}`);
        itemForm.reset();
    });
</script>

</body>
</html>
