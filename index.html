<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form Scanner - GitHub Pages</title>
    <style>
        /* Gaya UI Modern ala iOS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
        }
        
        /* Gaya Form */
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #007aff;
            background-color: #ffffff;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }

        /* Gaya Tombol */
        .btn {
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .btn:active {
            opacity: 0.7;
        }
        .btn-scan {
            background-color: #34c759;
            color: white;
            padding: 0 20px;
            white-space: nowrap;
        }
        .btn-submit {
            background-color: #007aff;
            color: white;
            padding: 16px;
            width: 100%;
            margin-top: 10px;
        }

        /* --- Tampilan Scanner --- */
        #scannerBox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .scanner-header {
            color: white;
            text-align: center;
            margin-bottom: 15px;
        }
        .scanner-header h3 {
            margin: 0 0 5px 0;
            font-size: 20px;
        }
        .scanner-header p {
            margin: 0;
            font-size: 14px;
            color: #d1d1d6;
        }
        .scanner-window {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 400px; 
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #444;
            background-color: #000;
        }
        
        /* Area fokus di tengah */
        .scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 150px;
            border: 2px solid #34c759;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            z-index: 5;
            pointer-events: none; /* Dikembalikan agar tidak ganggu kamera */
        }

        /* Animasi Garis Scan */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #34c759;
            box-shadow: 0 0 8px #34c759;
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #interactive.viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #interactive.viewport canvas.drawingBuffer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
        }
        #interactive.viewport video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        .btn-stop-modal {
            background-color: #ff3b30;
            color: white;
            padding: 14px 30px;
            border-radius: 30px;
            margin-top: 25px;
            font-size: 16px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Data Item</h2>
    
    <form id="itemForm">
        <div class="form-group">
            <label for="barcodeInput">Kode Barcode / SKU</label>
            <div class="input-group">
                <input type="text" id="barcodeInput" placeholder="Scan barcode..." required>
                <button type="button" id="startScanBtn" class="btn btn-scan">📷 Scan</button>
            </div>
        </div>

        <div class="form-group">
            <label for="itemName">Nama Barang</label>
            <input type="text" id="itemName" placeholder="Masukkan nama barang" required>
        </div>

        <button type="submit" class="btn btn-submit">Simpan Data</button>
    </form>
</div>

<div id="scannerBox">
    <div class="scanner-header">
        <h3>Scan Barcode</h3>
        <p>Arahkan kamera ke barcode</p>
    </div>
    
    <div class="scanner-window">
        <div id="interactive" class="viewport"></div>
        <div class="scanner-overlay">
            <div class="scan-line"></div>
        </div>
    </div>
    
    <button type="button" id="stopScanBtn" class="btn btn-stop-modal">Batal Scan</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<script>
    const startScanBtn = document.getElementById('startScanBtn');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const scannerBox = document.getElementById('scannerBox');
    const barcodeInput = document.getElementById('barcodeInput');
    const itemForm = document.getElementById('itemForm');

    // Variabel anti-mental
    let scanCount = 0;
    let lastScannedCode = "";

    startScanBtn.addEventListener('click', function() {
        scannerBox.style.display = 'flex';
        
        // Reset memori setiap buka scanner
        scanCount = 0;
        lastScannedCode = "";

        Quagga.init({
            inputStream : {
                name : "Live",
                type : "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    facingMode: "environment",
                    // Paksa resolusi tinggi agar barcode kecil tajam
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            },
            locator: {
                // Diubah ke small dan halfSample false agar lebih presisi untuk barcode kecil
                patchSize: "small",
                halfSample: false
            },
            numOfWorkers: navigator.hardwareConcurrency ? navigator.hardwareConcurrency : 4,
            decoder : {
                readers : ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"]
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Kamera tidak dapat diakses.");
                scannerBox.style.display = 'none';
                return;
            }
            Quagga.start();
        });
    });

    stopScanBtn.addEventListener('click', function() {
        Quagga.stop();
        scannerBox.style.display = 'none';
    });

    // Otomatis deteksi
    Quagga.onDetected(function(result) {
        const code = result.codeResult.code;

        // Logika verifikasi: Pastikan membaca angka yang sama persis 3x berturut-turut
        if (code === lastScannedCode) {
            scanCount++;
        } else {
            scanCount = 1;
            lastScannedCode = code;
        }

        // Jika sudah 3x terbaca sama, langsung input otomatis
        if (scanCount >= 3) {
            barcodeInput.value = code; // Angka 0 tidak dipotong sama sekali
            
            Quagga.stop();
            scannerBox.style.display = 'none';
            
            if ("vibrate" in navigator) {
                navigator.vibrate(200); 
            }
        }
    });

    itemForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const code = barcodeInput.value;
        const name = document.getElementById('itemName').value;
        alert(`Data Berhasil Disimpan!\n\nBarcode: ${code}\nNama: ${name}`);
        itemForm.reset();
    });
</script>

</body>
</html>
